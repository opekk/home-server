name: home-server

services:
  caddy:
    image: caddy:2.11-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - web

  portfolio:
    build:
      context: ./projects/portfolio
      dockerfile: Dockerfile
    container_name: portfolio
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - web

  tutor:
    image: sigoden/dufs:v0.45.0
    container_name: tutor
    restart: unless-stopped
    command: /srv --allow-search --allow-upload --allow-delete --auth admin:${TUTOR_PASSWORD}@/:rw
    volumes:
      - ./tutor/data:/srv
    networks:
      - web

  webhook:
    build:
      context: ./deploy
      dockerfile: Dockerfile
    container_name: webhook
    restart: unless-stopped
    read_only: true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    tmpfs:
      - /tmp
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/repo
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
