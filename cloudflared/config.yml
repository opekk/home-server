# This file is a reference — when using TUNNEL_TOKEN (recommended),
# the tunnel config is managed via the Cloudflare Zero Trust dashboard.
#
# If you prefer a local config file instead, replace the cloudflared
# command in docker-compose.yml with:
#   command: tunnel --config /etc/cloudflared/config.yml run
# and mount this file into the container.

tunnel: <YOUR_TUNNEL_ID>
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: portfolio.yourdomain.com
    service: http://caddy:80
  - hostname: tutor.yourdomain.com
    service: http://caddy:80
  - hostname: webhook.yourdomain.com
    service: http://caddy:80
  # Catch-all rule (required)
  - service: http_status:404
